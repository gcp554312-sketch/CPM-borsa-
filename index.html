<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTOBORSA - CPM</title>
    <style>
        /* Modern Cyberpunk / Glassmorphism Tema */
        body {
            background-color: #0d0f12;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #0d0f12;
            padding: 30px 20px 50px 20px;
            text-align: center;
            border-bottom: 2px solid #00ffcc;
            position: relative;
        }

        header h1 {
            margin: 0;
            font-size: 2.8em;
            letter-spacing: 3px;
            color: #00ffcc;
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.6);
        }

        header h2 {
            margin: 10px 0 0 0;
            font-size: 1.1em;
            color: #ff0055;
            font-weight: bold;
        }

        /* Profil Seçim Alanı (İşaret Ettiğin Boşluk) */
        .profile-switcher {
            position: absolute;
            top: 15px;
            right: 20px;
            background: #161920;
            border: 1px solid #00ffcc;
            color: #00ffcc;
            padding: 5px 10px;
            border-radius: 8px;
            font-weight: bold;
            outline: none;
            cursor: pointer;
        }

        /* Oval İlan Ekle Butonu */
        .open-form-btn {
            position: absolute;
            right: 50%;
            transform: translateX(50%);
            bottom: -22px;
            background-color: #0d0f12;
            color: #00ffcc;
            border: 2px solid #00ffcc;
            padding: 12px 35px;
            font-size: 1.1em;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.4);
            z-index: 10;
        }

        /* İlan Listesi */
        .container {
            max-width: 600px;
            margin: 50px auto;
            padding: 0 15px;
        }

        .car-card {
            background-color: #161920;
            border: 1px solid #232836;
            border-radius: 15px;
            margin-bottom: 20px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: border-color 0.2s;
        }

        .car-card:hover { border-color: #00ffcc; }
        .car-img { width: 100%; height: 240px; background: #232836; }
        .car-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        .car-info { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .car-title { font-size: 1.3em; font-weight: bold; margin: 0; }
        .car-meta { color: #a0aec0; font-size: 0.9em; margin-top: 5px; }

        .badge { padding: 5px 10px; border-radius: 6px; font-weight: bold; font-size: 0.9em; }
        .badge-satilik { background: rgba(0, 255, 204, 0.15); color: #00ffcc; border: 1px solid #00ffcc; }
        .badge-takas { background: rgba(255, 152, 0, 0.15); color: #ff9800; border: 1px solid #ff9800; }

        /* Modallar */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            align-items: center; justify-content: center;
            z-index: 100; padding: 15px; box-sizing: border-box;
        }

        .modal-content {
            background: #161920;
            padding: 25px;
            width: 100%;
            max-width: 400px;
            border-radius: 15px;
            border: 2px solid #00ffcc;
            position: relative;
        }

        .modal-content h3 { margin-top: 0; color: #00ffcc; text-align: center; }
        .close-btn { position: absolute; top: 15px; right: 15px; background: none; border: none; color: #ff0055; font-size: 1.5em; cursor: pointer; }

        /* Form Elemanları */
        .input-field {
            width: 100%; padding: 12px; margin-bottom: 12px;
            background: #232836; border: 1px solid #232836;
            color: white; border-radius: 8px; box-sizing: border-box;
        }
        .input-field:focus { border-color: #00ffcc; outline: none; }
        .radio-group { display: flex; gap: 20px; margin-bottom: 15px; }

        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1em; margin-top: 10px; }
        .btn-prime { background: #00ffcc; color: #0d0f12; }
        .btn-danger { background: #ff0055; color: white; }

        /* Instagram / TikTok Tipi Sohbet Alanı */
        .chat-container {
            height: 200px; overflow-y: auto;
            background: #0d0f12; border-radius: 10px;
            padding: 10px; margin-bottom: 10px;
            display: flex; flex-direction: column; gap: 8px;
        }

        .msg { max-width: 75%; padding: 8px 12px; border-radius: 14px; font-size: 0.95em; word-wrap: break-word; }
        .msg-giden { background: #ff0055; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg-gelen { background: #232836; color: white; align-self: flex-start; border-bottom-left-radius: 2px; }
    </style>
</head>
<body>

    <header>
        <select id="currentProfile" class="profile-switcher" onchange="changeProfile()">
            <option value="Yakup">Yakup (Siz)</option>
            <option value="Ahmet">Ahmet</option>
            <option value="Mehmet">Mehmet</option>
        </select>

        <h1>OTOBORSA</h1>
        <h2>CAR PARKING MULTIPLAYER PAZARI</h2>
        <button class="open-form-btn" onclick="openModal('addModal')">+ İlan Ekle</button>
    </header>

    <div class="container" id="adList"></div>

    <div id="addModal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal('addModal')">✕</button>
            <h3>Yeni İlan Ekle</h3>
            <input type="text" id="carName" class="input-field" placeholder="Araba İsmi">
            <input type="text" id="ownerName" class="input-field" placeholder="Sahibinin İsmi" readonly>
            <input type="text" id="imgUrl" class="input-field" placeholder="Fotoğraf Linki">
            
            <div class="radio-group">
                <label><input type="radio" name="carType" value="Takaslık" checked onclick="togglePrice(false)"> Takaslık</label>
                <label><input type="radio" name="carType" value="Satılık" onclick="togglePrice(true)"> Satılık</label>
            </div>
            <input type="number" id="carPrice" class="input-field" placeholder="Fiyat (Maks 50.000.000 TL)" style="display: none;">

            <button class="btn btn-prime" onclick="addNewAd()">Yayınla</button>
        </div>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal('detailModal')">✕</button>
            <h3 id="detailTitle">Araba Detayı</h3>
            <p id="detailOwner" style="color: #a0aec0; text-align: center; margin-top: -10px;"></p>

            <div class="chat-container" id="chatContainer"></div>
            <div id="msgActionArea" style="display: flex; gap: 5px;">
                <input type="text" id="chatInput" class="input-field" placeholder="Mesaj yaz..." style="margin-bottom: 0;">
                <button class="btn btn-prime" onclick="sendDirectMessage()" style="width: auto; margin-top: 0; padding: 0 15px;">Gönder</button>
            </div>

            <button id="deleteBtn" class="btn btn-danger" onclick="deleteCurrentAd()" style="display: none;">İlanı Sil</button>
        </div>
    </div>

    <script>
        // Orijinal Sabit 5 Araçlık Ana Başlangıç Listesi
        const defaultAds = [
            { id: 11, owner: "Yakup", title: "BMW i8", type: "Satılık", price: 1000000, img: "https://i.hizliresim.com/nwx796a.jpg" },
            { id: 22, owner: "Ahmet", title: "Krom Jant Transit", type: "Takaslık", price: 0, img: "https://i.hizliresim.com/8tiowo9.jpg" },
            { id: 33, owner: "Ahmet", title: "Karavan Sirenli", type: "Takaslık", price: 0, img: "https://i.hizliresim.com/plb8pgp.jpg" },
            { id: 44, owner: "Ahmet", title: "Pikap Dodge Jeep", type: "Satılık", price: 1000000, img: "https://i.hizliresim.com/pum61p1.jpg" },
            { id: 55, owner: "Mehmet", title: "Krom Jant Kartal", type: "Takaslık", price: 0, img: "https://i.hizliresim.com/2zzzaoi.jpg" }
        ];

        let ads = JSON.parse(localStorage.getItem('cpm_ads')) || [...defaultAds];
        let messages = JSON.parse(localStorage.getItem('cpm_msgs')) || {};
        let activeAdId = null;

        window.onload = function() {
            changeProfile(); 
            renderAds();
        };

        function changeProfile() {
            let profile = document.getElementById('currentProfile').value;
            document.getElementById('ownerName').value = profile;
        }

        function renderAds() {
            localStorage.setItem('cpm_ads', JSON.stringify(ads));
            const list = document.getElementById('adList');
            list.innerHTML = "";

            ads.forEach(ad => {
                let statusBadge = ad.type === "Satılık" ? 
                    `<span class="badge badge-satilik">${Number(ad.price).toLocaleString('tr-TR')} TL</span>` : 
                    `<span class="badge badge-takas">Takaslık</span>`;

                list.innerHTML += `
                    <div class="car-card" onclick="openDetailModal(${ad.id})">
                        <div class="car-img"><img src="${ad.img}"></div>
                        <div class="car-info">
                            <div>
                                <h4 class="car-title">${ad.title}</h4>
                                <div class="car-meta">Sahibi: ${ad.owner}</div>
                            </div>
                            <div>${statusBadge}</div>
                        </div>
                    </div>
                `;
            });
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function togglePrice(show) { document.getElementById('carPrice').style.display = show ? 'block' : 'none'; }

        // Maksimum 50M Limitli İlan Ekleme
        function addNewAd() {
            let title = document.getElementById('carName').value.trim();
            let owner = document.getElementById('ownerName').value;
            let img = document.getElementById('imgUrl').value.trim() || "https://via.placeholder.com/600x240";
            let type = document.querySelector('input[name="carType"]:checked').value;
            let price = parseInt(document.getElementById('carPrice').value) || 0;

            if(!title) { alert("Araba ismi boş bırakılamaz!"); return; }
            if(type === "Satılık" && (price <= 0 || price > 50000000)) { 
                alert("Fiyat 0'dan büyük ve maksimum 50.000.000 TL (50M) olmalıdır!"); 
                return; 
            }

            ads.unshift({ id: Date.now(), owner: owner, title: title, type: type, price: price, img: img });
            renderAds();
            closeModal('addModal');

            // Form Temizliği
            document.getElementById('carName').value = "";
            document.getElementById('imgUrl').value = "";
            document.getElementById('carPrice').value = "";
            togglePrice(false);
        }

        // Detaylar ve Güvenli Erişim Sistemi
        function openDetailModal(id) {
            activeAdId = id;
            let ad = ads.find(a => a.id == id);
            let viewer = document.getElementById('currentProfile').value;

            document.getElementById('detailTitle').innerText = ad.title;
            document.getElementById('detailOwner').innerText = "İlan Sahibi: " + ad.owner;

            // Güvenlik: Sadece kendi ilanını silme yetkisi
            let delBtn = document.getElementById('deleteBtn');
            if (ad.owner === viewer) {
                delBtn.style.display = 'block';
                document.getElementById('msgActionArea').style.display = 'none'; // Kendine mesaj atamaz
            } else {
                delBtn.style.display = 'none';
                document.getElementById('msgActionArea').style.display = 'flex'; // Başkasına mesaj yazabilir
            }

            loadChats();
            openModal('detailModal');
        }

        // Sosyal Medya Tarzı Mesaj Yükleme
        function loadChats() {
            const chatContainer = document.getElementById('chatContainer');
            chatContainer.innerHTML = "";
            let viewer = document.getElementById('currentProfile').value;
            let chatKey = activeAdId + "_" + viewer;

            if (messages[chatKey]) {
                messages[chatKey].forEach(m => {
                    let sideClass = m.sender === viewer ? "msg-giden" : "msg-gelen";
                    chatContainer.innerHTML += `<div class="msg ${sideClass}">${m.text}</div>`;
                });
            }
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Mesaj Gönderme
        function sendDirectMessage() {
            let text = document.getElementById('chatInput').value.trim();
            let viewer = document.getElementById('currentProfile').value;
            if(!text) return;

            let chatKey = activeAdId + "_" + viewer;
            if(!messages[chatKey]) messages[chatKey] = [];

            messages[chatKey].push({ sender: viewer, text: text });
            localStorage.setItem('cpm_msgs', JSON.stringify(messages));

            document.getElementById('chatInput').value = "";
            loadChats();
        }

        // Sadece Kendi İlanını Silme Kontrolü
        function deleteCurrentAd() {
            let ad = ads.find(a => a.id == activeAdId);
            let viewer = document.getElementById('currentProfile').value;

            if(ad.owner !== viewer) {
                alert("Hata: Başkasının ilanını silemezsiniz!");
                return;
            }

            ads = ads.filter(a => a.id !== activeAdId);
            renderAds();
            closeModal('detailModal');
        }
    </script>
</body>
</html>
