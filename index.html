<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Google Search Console Doğrulama Kodu -->
    <meta name="google-site-verification" content="lxTEY-Gg1mmav7LYW_9Yox_suzIsB8JP3N5wTYwEozE" />
    
    <!-- SEO Ayarları -->
    <title>cpmborsa - OTOBORSA - CPM Araç Pazarı</title>
    <meta name="description" content="cpmborsa ile Car Parking Multiplayer (CPM) satılık ve takaslık araba ilanlarına göz atın. En tarz krom jant, çizimli araçlar ve güncel CPM araba piyasası!">

    <style>
        /* Genel Sayfa Ayarları (Koyu Tema) */
        body {
            background-color: #0d0f12;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Üst Başlık Alanı (Header) */
        header {
            background: linear-gradient(135deg, #1a1c23 0%, #0d0f12 100%);
            padding: 30px 20px 55px 20px;
            text-align: center;
            border-bottom: 2px solid #00ffcc;
            box-shadow: 0 4px 15px rgba(0, 255, 204, 0.2);
            position: relative;
        }

        header h1 {
            margin: 0;
            font-size: 3em;
            letter-spacing: 3px;
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.6);
        }

        header h2 {
            margin: 10px 0 0 0;
            font-size: 1.4em;
            color: #ff0055;
            font-weight: 600;
            text-shadow: 0 0 8px rgba(255, 0, 85, 0.5);
        }

        /* Çizginin Üstündeki Oval Buton */
        .open-form-btn {
            position: absolute;
            right: 25px;
            bottom: 8px;
            background-color: #161920;
            color: #00ffcc;
            border: 2px solid #00ffcc;
            padding: 10px 24px;
            font-size: 1.1em;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
            transition: all 0.2s ease;
            z-index: 10;
        }

        .open-form-btn:hover {
            background-color: #00ffcc;
            color: #0d0f12;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.6);
        }

        /* Aktif Kullanıcı Seçici (Simülasyon İçin) */
        .user-simulator-bar {
            background-color: #1a1c23;
            padding: 8px;
            text-align: center;
            font-size: 0.85em;
            border-bottom: 1px solid #232836;
            color: #a0aec0;
        }
        .user-simulator-bar select {
            background-color: #0d0f12;
            color: #00ffcc;
            border: 1px solid #00ffcc;
            border-radius: 4px;
            padding: 2px 5px;
            cursor: pointer;
        }

        /* Modallar Genel Arka Plan Karartması */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            padding: 20px;
            box-sizing: border-box;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Form ve Menü Kutuları */
        .add-panel {
            background-color: #161920;
            border: 2px solid #00ffcc;
            border-radius: 15px;
            width: 100%;
            max-width: 450px;
            padding: 25px;
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.2);
            position: relative;
            transform: scale(0.85);
            transition: transform 0.25s ease;
        }
        .modal-overlay.active .add-panel {
            transform: scale(1);
        }

        .add-panel h3 {
            margin-top: 0;
            color: #00ffcc;
            font-size: 1.6em;
            text-align: center;
            margin-bottom: 20px;
        }

        .close-modal-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: #ff0055;
            font-size: 1.5em;
            cursor: pointer;
        }

        /* Görsel Seçme Alanı */
        .file-box {
            width: 100%;
            height: 130px;
            border: 2px dashed #00ffcc;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #00ffcc;
            margin-bottom: 15px;
            box-sizing: border-box;
            background-size: cover;
            background-position: center;
            font-size: 0.95em;
        }

        /* Giriş Elemanları */
        .input-field {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            background-color: #232836;
            border: 1px solid #00ffcc;
            color: #ffffff;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        .input-field::placeholder { color: #5a6578; }
        .input-field:focus { outline: none; box-shadow: 0 0 5px rgba(0, 255, 204, 0.5); }

        .type-group {
            display: flex;
            gap: 30px;
            margin-bottom: 15px;
            padding-left: 5px;
        }
        .type-group label { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .type-group input[type="radio"] { accent-color: #00ffcc; transform: scale(1.2); }

        .submit-btn {
            background-color: #00ffcc;
            color: #0d0f12;
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 1.1em;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Dinamik Seçenek Butonları (Sil / Detay) */
        .action-menu-btn {
            width: 100%;
            padding: 15px;
            margin-bottom: 10px;
            font-size: 1.2em;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            text-align: center;
            transition: opacity 0.2s;
        }
        .action-menu-btn.delete-btn {
            background-color: rgba(255, 0, 85, 0.15);
            color: #ff0055;
            border: 2px solid #ff0055;
        }
        .action-menu-btn.details-btn {
            background-color: rgba(0, 255, 204, 0.15);
            color: #00ffcc;
            border: 2px solid #00ffcc;
        }
        .action-menu-btn:hover { opacity: 0.85; }

        /* Mesajlaşma Bölümü İç Tasarımı */
        .chat-box {
            background-color: #0d0f12;
            border: 1px solid #232836;
            border-radius: 8px;
            height: 180px;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .msg {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.95em;
            line-height: 1.4;
        }
        .msg.me {
            background-color: #00ffcc;
            color: #0d0f12;
            align-self: flex-end;
        }
        .msg.other {
            background-color: #232836;
            color: #ffffff;
            align-self: flex-start;
        }

        /* İlan Listesi Düzeni */
        .container {
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* Kart Yapısı */
        .car-card {
            background-color: #161920;
            border: 1px solid #232836;
            border-radius: 12px;
            display: flex;
            margin-bottom: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .car-card:hover {
            transform: translateY(-2px);
            border-color: #00ffcc;
        }

        .car-image {
            width: 240px;
            min-width: 240px;
            height: 160px;
            background-color: #232836;
        }
        .car-image img { width: 100%; height: 100%; object-fit: cover; }

        .car-details {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .car-title { font-size: 1.3em; font-weight: bold; margin: 0 0 10px 0; }
        .car-info-row { display: flex; gap: 15px; font-size: 0.9em; color: #a0aec0; }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.9em;
        }
        .status-takas { background-color: rgba(255, 152, 0, 0.15); color: #ff9800; border: 1px solid #ff9800; }
        .status-satilik { background-color: rgba(0, 255, 204, 0.15); color: #00ffcc; border: 1px solid #00ffcc; }
        .price-tag { font-size: 1.4em; font-weight: bold; color: #00ffcc; }

        /* SİMÜLE EDİLEN TELEFON BİLDİRİM KUTUSU */
        .push-notification {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 380px;
            background-color: #1a1c23;
            border-left: 5px solid #ff0055;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border-radius: 8px;
            padding: 15px;
            z-index: 1000;
            transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .push-notification.show { top: 20px; }
        .push-notification .icon { font-size: 1.5em; }
        .push-notification .title { font-weight: bold; color: #ff0055; margin-bottom: 2px; font-size: 0.95em;}
        .push-notification .desc { color: #ffffff; font-size: 0.85em; }

        /* Mobil Uyumluluk */
        @media (max-width: 600px) {
            header { padding: 25px 15px 55px 15px; }
            .open-form-btn { right: 15px; bottom: 8px; padding: 8px 18px; font-size: 0.95em; }
            .car-card { flex-direction: column; }
            .car-image { width: 100%; height: 180px; }
            header h1 { font-size: 2.2em; }
            header h2 { font-size: 1.05em; }
        }
    </style>
</head>
<body>

    <!-- SİMÜLASYON KONTROL BARI -->
    <div class="user-simulator-bar">
        Şu an Sitede Gezinen Profil (Siz): 
        <select id="currentUserSelect" onchange="changeActiveUser()">
            <option value="Yakup" selected>Yakup (Siz)</option>
            <option value="Ahmet">Ahmet</option>
            <option value="Mehmet">Mehmet</option>
        </select>
        <span style="font-size:0.85em; color:#63738a; margin-left:10px;">(Test etmek için değiştirebilirsiniz)</span>
    </div>

    <!-- ÜST BAŞLIK VE BUTON -->
    <header>
        <h1>OTOBORSA</h1>
        <h2>CAR PARKING MULTIPLAYER SATILIK - TAKASLIK ARABALAR</h2>
        <button class="open-form-btn" onclick="openModal('addModal')">+ İlan Ekle</button>
    </header>

    <!-- ANLIK TELEFON BİLDİRİM SİMÜLATÖRÜ -->
    <div class="push-notification" id="pushNotification">
        <div class="icon">💬</div>
        <div>
            <div class="title" id="notifyTitle">Bildirim!</div>
            <div class="desc" id="notifyDesc">Yeni bir mesajınız var.</div>
        </div>
    </div>

    <!-- MODAL 1: İLAN EKLEME FORMU -->
    <div class="modal-overlay" id="addModal" onclick="closeModalOutside(event, 'addModal')">
        <div class="add-panel">
            <button class="close-modal-btn" onclick="closeModal('addModal')">✕</button>
            <h3>+ Sende İlan Ekle</h3>
            
            <label class="file-box" id="fileLabel" for="photoInput">
                <span id="uploadText">📷 Fotoğraf Seç (Galeri / Dosyalar)</span>
                <input type="file" id="photoInput" accept="image/*" style="display: none;" onchange="previewImage(this)">
            </label>

            <!-- İlan Sahibi İsmi Girişi -->
            <input type="text" id="ownerNameInput" class="input-field" placeholder="İlan Sahibi İsmi (Örn: Yakup)">
            <input type="text" id="carNameInput" class="input-field" placeholder="Araba Adı">

            <div class="type-group">
                <label><input type="radio" name="carType" value="Takaslık" checked onclick="togglePriceField(false)"> Takaslık</label>
                <label><input type="radio" name="carType" value="Satılık" onclick="togglePriceField(true)"> Satılık</label>
            </div>

            <input type="number" id="priceInput" class="input-field" placeholder="Fiyat (Maksimum 50.000.000 TL)" max="50000000" style="display: none;">
            <button class="submit-btn" onclick="addNewAd()">ONAYLA</button>
        </div>
    </div>

    <!-- MODAL 2: SEÇENEKLER & AKSİYON PENCERESİ -->
    <div class="modal-overlay" id="actionModal" onclick="closeModalOutside(event, 'actionModal')">
        <div class="add-panel" style="max-width: 400px;">
            <button class="close-modal-btn" onclick="closeModal('actionModal')">✕</button>
            <h3 id="actionModalTitle">İlan İşlemleri</h3>
            
            <div id="actionOptions">
                <!-- JavaScript duruma göre burayı dolduracak -->
            </div>
        </div>
    </div>

    <!-- İLAN LİSTESİ KONTEYNERİ -->
    <div class="container" id="adContainer">
        <!-- İlanlar dinamik olarak yüklenecek ve güncellenecektir -->
    </div>

    <script>
        // Varsayılan İlk İlan Veri Seti
        const defaultAds = [
            { id: 1, owner: "Ahmet", title: "Krom Jant Transit", type: "Takaslık", price: "", img: "https://i.hizliresim.com/8tiowo9.jpg" },
            { id: 2, owner: "Ahmet", title: "Karavan Sirenli", type: "Takaslık", price: "", img: "https://i.hizliresim.com/plb8pgp.jpg" },
            { id: 3, owner: "Mehmet", title: "Krom Jant Kartal", type: "Takaslık", price: "", img: "https://i.hizliresim.com/2zzzaoi.jpg" },
            { id: 4, owner: "Ahmet", title: "Pikap Dodge Jeep", type: "Satılık", price: "1000000", img: "https://i.hizliresim.com/pum61p1.jpg" },
            { id: 5, owner: "Oyuncu", title: "Krom + Çizimli BMW i8", type: "Takaslık", price: "", img: "https://i.hizliresim.com/nwx796a.jpg" }
        ];

        let ads = JSON.parse(localStorage.getItem('cpm_ads')) || defaultAds;
        let selectedImageBase64 = "";
        let currentSelectedAdId = null;

        // Sayfa ilk yüklendiğinde ilanları bas
        window.onload = function() {
            renderAds();
            // Form açıldığında varsayılan olarak seçili kullanıcıyı sahibine yazsın
            document.getElementById('ownerNameInput').value = document.getElementById('currentUserSelect').value;
        };

        function changeActiveUser() {
            document.getElementById('ownerNameInput').value = document.getElementById('currentUserSelect').value;
            renderAds(); // Görünümü yenile (sil butonu yetkileri değişeceği için)
        }

        // İlanları Ekrana Basma Fonksiyonu
        function renderAds() {
            const container = document.getElementById('adContainer');
            container.innerHTML = "";

            ads.forEach(ad => {
                const card = document.createElement('div');
                card.className = 'car-card';
                card.setAttribute('onclick', `handleCardClick(${ad.id})`);

                let statusHTML = `<span class="status-badge status-takas">Takaslık</span>`;
                if (ad.type === "Satılık") {
                    const formattedPrice = Number(ad.price).toLocaleString('tr-TR') + " TL";
                    statusHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; margin-top: 10px;">
                            <span class="status-badge status-satilik">Satılık</span>
                            <span class="price-tag">${formattedPrice}</span>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="car-image"><img src="${ad.img}" alt="${ad.title}"></div>
                    <div class="car-details">
                        <div>
                            <p class="car-title">${ad.title}</p>
                            <div class="car-info-row">
                                <span>Sahibi: ${ad.owner}</span>
                                <span>Oyun: CPM</span>
                            </div>
                        </div>
                        ${statusHTML}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Karta Tıklanınca Açılacak Akıllı Menü Mantığı
        function handleCardClick(adId) {
            currentSelectedAdId = adId;
            const ad = ads.find(a => a.id === adId);
            const currentUser = document.getElementById('currentUserSelect').value;
            
            const modalTitle = document.getElementById('actionModalTitle');
            const optionsDiv = document.getElementById('actionOptions');
            
            modalTitle.innerText = ad.title;
            optionsDiv.innerHTML = "";

            // EĞER İLAN GİRİŞ YAPAN KULLANICIYA AİTSE -> Sadece SİLME yetkisi
            if (ad.owner.toLowerCase() === currentUser.toLowerCase()) {
                optionsDiv.innerHTML = `
                    <p style="text-align:center; color:#a0aec0; margin-bottom:15px; font-size:0.9em;">Bu ilan size ait.</p>
                    <button class="action-menu-btn delete-btn" onclick="deleteAd(${ad.id})">İlanı Sil</button>
                `;
            } 
            // BAŞKASININ İLANIYSA -> Sadece DETAYLAR ve MESAJLAŞMA yetkisi
            else {
                optionsDiv.innerHTML = `
                    <button class="action-menu-btn details-btn" onclick="showChatInterface('${ad.owner}')">Detaylar ve Mesaj Gönder</button>
                `;
            }

            openModal('actionModal');
        }

        // İlan Silme İşlemi
        function deleteAd(adId) {
            if(confirm("Bu ilanı tamamen silmek istediğinize emin misiniz?")) {
                ads = ads.filter(a => a.id !== adId);
                localStorage.setItem('cpm_ads', JSON.stringify(ads));
                closeModal('actionModal');
                renderAds();
            }
        }

        // Detaylar altından Mesajlaşma Ekranını Açma
        function showChatInterface(ownerName) {
            const optionsDiv = document.getElementById('actionOptions');
            const currentUser = document.getElementById('currentUserSelect').value;

            optionsDiv.innerHTML = `
                <p style="color:#00ffcc; font-size:0.95em; margin: 0 0 10px 0;">Satıcı: <b>${ownerName}</b> ile mesajlaşma</p>
                
                <div class="chat-box" id="chatBox">
                    <div class="msg other">Merhaba! Araç hala satılık mı/takaslık mı?</div>
                </div>

                <div style="display:flex; gap:8px;">
                    <input type="text" id="chatInput" class="input-field" placeholder="Mesajınızı yazın..." style="margin-bottom:0;">
                    <button class="submit-btn" style="width:70px; padding:0;" onclick="sendMessageSim('${curr
