<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTOBORSA - İlan Ekle</title>
    <style>
        body { background: #0d0f12; color: #fff; font-family: Arial; margin: 0; padding: 20px; }
        .form-area { background: #161920; padding: 20px; border-radius: 10px; border: 1px solid #00ffcc; max-width: 400px; margin: 0 auto 20px; }
        input { width: 100%; padding: 10px; margin: 5px 0; background: #232836; border: 1px solid #00ffcc; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #00ffcc; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .ad { background: #161920; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; }
        .ad img { width: 80px; height: 80px; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="form-area">
        <h3>İlan Ekle</h3>
        <input type="file" id="f" accept="image/*">
        <input type="text" id="o" placeholder="Sahibi">
        <input type="text" id="t" placeholder="Araba Modeli">
        <input type="number" id="p" placeholder="Fiyat (TL)">
        <button onclick="saveAd()">İLAN EKLE</button>
    </div>

    <div id="list"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        const db = getDatabase(initializeApp({ databaseURL: "https://comborse-76fee-default-rtdb.firebaseio.com/" }));
        const adsRef = ref(db, 'ads');
        let img = "";

        document.getElementById('f').onchange = (e) => {
            const r = new FileReader();
            r.onload = (ev) => img = ev.target.result;
            r.readAsDataURL(e.target.files[0]);
        };

        window.saveAd = () => {
            if(!img || !document.getElementById('t').value) return alert("Resim ve model zorunlu!");
            push(adsRef, {
                o: document.getElementById('o').value,
                t: document.getElementById('t').value,
                p: document.getElementById('p').value,
                img: img
            }).then(() => location.reload());
        };

        onValue(adsRef, (snapshot) => {
            const d = snapshot.val();
            const l = document.getElementById('list');
            l.innerHTML = "";
            if(d) {
                Object.keys(d).forEach(k => {
                    l.innerHTML += `<div class="ad">
                        <img src="${d[k].img}">
                        <div>
                            <h4>${d[k].t}</h4>
                            <p>${d[k].p} TL</p>
                            <button style="background:#ff0055; padding:5px" onclick="remove(ref(db, 'ads/${k}')).then(()=>location.reload())">Sil</button>
                        </div>
                    </div>`;
                });
            }
        });
    </script>
</body>
</html>
