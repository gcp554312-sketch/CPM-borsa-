<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTOBORSA - CPM</title>
    <style>
        /* Genel Tasarım (Neon Yeşil Koyu Tema) */
        body { 
            background-color: #0d0f12; 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 0;
        }
        header { 
            padding: 30px 20px; 
            text-align: center; 
            border-bottom: 2px solid #00ffcc; 
            position: relative;
        }
        h1 { color: #00ffcc; margin: 0; font-size: 2.5em; text-shadow: 0 0 10px rgba(0,255,204,0.5); }
        
        .open-form-btn { 
            background: #0d0f12; 
            color: #00ffcc; 
            border: 2px solid #00ffcc; 
            padding: 10px 25px; 
            border-radius: 20px; 
            cursor: pointer; 
            margin-top: 15px;
            font-weight: bold;
        }
        .open-form-btn:hover { background: #00ffcc; color: #0d0f12; }

        .container { max-width: 600px; margin: 30px auto; padding: 0 15px; }
        
        /* İlan Kartları */
        .car-card { 
            background: #161920; 
            border: 1px solid #232836; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            overflow: hidden; 
            cursor: pointer; 
            transition: border-color 0.2s;
        }
        .car-card:hover { border-color: #00ffcc; }
        .car-img { width: 100%; height: 260px; background: #232836; }
        .car-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .car-info { padding: 15px; }
        .car-title { font-size: 1.4em; font-weight: bold; margin: 0 0 5px 0; }
        .car-owner { color: #a0aec0; font-size: 0.95em; }

        /* Ortak Modal (Açılır Pencere) Tasarımı */
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); 
            align-items: center; 
            justify-content: center; 
            z-index: 100;
        }
        .modal-content { 
            background: #161920; 
            padding: 25px; 
            width: 85%; 
            max-width: 420px; 
            border-radius: 15px; 
            border: 2px solid #00ffcc; 
            box-shadow: 0 0 20px rgba(0,255,204,0.3);
        }
        .modal-content h3 { margin-top: 0; color: #00ffcc; text-align: center; }

        /* Form Girdi Alanları */
        .input-field { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 12px; 
            background: #232836; 
            border: 1px solid #00ffcc; 
            color: white; 
            border-radius: 8px; 
            box-sizing: border-box; 
        }
        .type-group { display: flex; gap: 20px; margin-bottom: 15px; }

        /* Butonlar */
        .btn { 
            width: 100%; 
            padding: 12px; 
            margin-top: 10px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1em;
        }
        .btn-success { background: #00ffcc; color: #0d0f12; }
        .btn-danger { background: #ff0055; color: white; }
        .btn-close { background: none; border: 1px solid #555; color: #ccc; }

        /* Sohbet Alanı */
        .chat-box { 
            height: 120px; 
            overflow-y: auto; 
            background: #0d0f12; 
            padding: 10px; 
            border-radius: 8px; 
            margin-bottom: 10px; 
            font-size: 0.95em;
        }
    </style>
</head>
<body>

<header>
    <h1>OTOBORSA</h1>
    <!-- Detaylı Formu Açan Buton -->
    <button class="open-form-btn" onclick="openAddModal()">+ İlan Ekle</button>
</header>

<div class="container" id="adList"></div>

<!-- 1. DETAYLI İLAN EKLEME MODALI (İstediğin Yer) -->
<div id="addModal" class="modal">
    <div class="modal-content">
        <h3>+ Yeni İlan Ekle</h3>
        <input type="text" id="carNameInput" class="input-field" placeholder="Araba Adı Ne?">
        <input type="text" id="ownerNameInput" class="input-field" placeholder="Sahibinin İsmi">
        <input type="text" id="imgUrlInput" class="input-field" placeholder="Fotoğraf Linki (Hızlıresim vb.)">
        
        <div class="type-group">
            <label><input type="radio" name="carType" value="Takaslık" checked onclick="togglePriceField(false)"> Takaslık</label>
            <label><input type="radio" name="carType" value="Satılık" onclick="togglePriceField(true)"> Satılık</label>
        </div>
        <input type="number" id="priceInput" class="input-field" placeholder="Fiyat Yaz (TL)" style="display: none;">

        <button class="btn btn-success" onclick="publishAd()">Yayınla</button>
        <button class="btn btn-close" onclick="closeAddModal()">İptal</button>
    </div>
</div>

<!-- 2. DETAYLAR, SİLME VE MESAJLAŞMA MODALI -->
<div id="actionModal" class="modal">
    <div class="modal-content">
        <h3 id="modalAdTitle">İlan Detayı</h3>
        
        <!-- Sohbet / Mesaj Yaz Yeri -->
        <div class="chat-box" id="chatArea">
            <p style="color:#00ffcc; margin:0 0 5px 0;">Satıcıyla Mesajlaşma:</p>
        </div>
        <input type="text" id="msgInput" class="input-field" placeholder="Mesajınızı yazın...">
        <button class="btn btn-success" onclick="sendChat()">Mesajı Gönder</button>
        
        <!-- İlanı Silme Butonu -->
        <button class="btn btn-danger" onclick="deleteAd()">Bu İlanı Sil</button>
        <button class="btn btn-close" onclick="closeActionModal()">Kapat</button>
    </div>
</div>

<script>
    // 5 Orijinal ve Kusursuz İlan Listesi
    let cars = [
        {id: 1, owner: "Oyuncu", title: "BMW i8", type: "Satılık", price: "1000000", img: "https://i.hizliresim.com/nwx796a.jpg"},
        {id: 2, owner: "Ahmet", title: "Krom Jant Transit", type: "Takaslık", price: "", img: "https://i.hizliresim.com/8tiowo9.jpg"},
        {id: 3, owner: "Ahmet", title: "Karavan Sirenli", type: "Takaslık", price: "", img: "https://i.hizliresim.com/plb8pgp.jpg"},
        {id: 4, owner: "Ahmet", title: "Pikap Dodge Jeep", type: "Satılık", price: "1000000", img: "https://i.hizliresim.com/pum61p1.jpg"},
        {id: 5, owner: "Mehmet", title: "Krom Jant Kartal", type: "Takaslık", price: "", img: "https://i.hizliresim.com/2zzzaoi.jpg"}
    ];
    let selectedAdId = null;

    // İlanları Ekrana Listeleme
    function render() {
        const listDiv = document.getElementById('adList');
        listDiv.innerHTML = "";
        
        cars.forEach(c => {
            let typeText = c.type === "Satılık" ? `${Number(c.price).toLocaleString('tr-TR')} TL` : "Takaslık";
            listDiv.innerHTML += `
                <div class="car-card" onclick="openActionModal(${c.id})">
                    <div class="car-img"><img src="${c.img}" alt="${c.title}"></div>
                    <div class="car-info">
                        <div class="car-title">${c.title}</div>
                        <div class="car-owner">Sahibi: ${c.owner} | Durum: ${typeText}</div>
                    </div>
                </div>
            `;
        });
    }

    /* İlan Ekleme Modalı Fonksiyonları */
    function openAddModal() { document.getElementById('addModal').style.display = 'flex'; }
    function closeAddModal() { document.getElementById('addModal').style.display = 'none'; }
    function togglePriceField(show) { document.getElementById('priceInput').style.display = show ? 'block' : 'none'; }

    // Yeni İlanı Detaylarıyla Listeye Ekleme
    function publishAd() {
        let name = document.getElementById('carNameInput').value.trim();
        let owner = document.getElementById('ownerNameInput').value.trim();
        let img = document.getElementById('imgUrlInput').value.trim() || "https://via.placeholder.com/600x260";
        let type = document.querySelector('input[name="carType"]:checked').value;
        let price = document.getElementById('priceInput').value.trim();

        if(!name || !owner) { alert("Lütfen araba adını ve isminizi yazın!"); return; }
        if(type === "Satılık" && !price) { alert("Lütfen fiyat girin!"); return; }

        cars.unshift({ id: Date.now(), owner: owner, title: name, type: type, price: price, img: img });
        render();
        closeAddModal();

        // Formu temizle
        document.getElementById('carNameInput').value = "";
        document.getElementById('ownerNameInput').value = "";
        document.getElementById('imgUrlInput').value = "";
        document.getElementById('priceInput').value = "";
    }

    /* Detay, Silme ve Mesaj Modalı Fonksiyonları */
    function openActionModal(id) {
        selectedAdId = id;
        let ad = cars.find(c => c.id == id);
        document.getElementById('modalAdTitle').innerText = ad.title + " - Detayları";
        document.getElementById('chatArea').innerHTML = `<p style="color:#00ffcc; margin:0 0 5px 0;">Satıcı: ${ad.owner} ile mesajlaşma başladı.</p>`;
        document.getElementById('actionModal').style.display = 'flex';
    }
    function closeActionModal() { document.getElementById('actionModal').style.display = 'none'; }

    // İlan Silme
    function deleteAd() {
        cars = cars.filter(c => c.id !== selectedAdId);
        render();
        closeActionModal();
    }

    // Detay Alanından Mesaj Yazma / Gönderme
    function sendChat() {
        let txt = document.getElementById('msgInput').value.trim();
        if(txt) {
            document.getElementById('chatArea').innerHTML += `<p style="margin:3px 0;"><b>Siz:</b> ${txt}</p>`;
            document.getElementById('msgInput').value = "";
            // Otomatik aşağı kaydır
            let chat = document.getElementById('chatArea');
            chat.scrollTop = chat.scrollHeight;
        }
    }

    // Sayfa açılınca ilk yükleme
    render();
</script>

</body>
</html>
