<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTOBORSA - CPM Araç Pazarı</title>
    <style>
        body { background-color: #0d0f12; color: #ffffff; font-family: sans-serif; margin: 0; padding: 0; }
        header { background: #1a1c23; padding: 20px; text-align: center; border-bottom: 2px solid #00ffcc; }
        .open-btn { background: #00ffcc; color: #0d0f12; border: none; padding: 12px 25px; border-radius: 20px; font-weight: bold; cursor: pointer; }
        /* Modal Stilleri */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal.show { display: flex; }
        .panel { background: #161920; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; border: 1px solid #00ffcc; }
        .input-field { width: 100%; padding: 12px; margin: 8px 0; background: #232836; border: 1px solid #00ffcc; color: white; border-radius: 5px; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 12px; background: #00ffcc; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .car-card { background: #161920; border: 1px solid #232836; margin: 15px auto; max-width: 500px; border-radius: 10px; overflow: hidden; display: flex; }
        .car-image { width: 150px; height: 100px; background: #232836; }
        .car-image img { width: 100%; height: 100%; object-fit: cover; }
        .details { padding: 10px; flex-grow: 1; }
        .btn-del { background: #ff0055; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h1>OTOBORSA</h1>
    <button class="open-btn" onclick="document.getElementById('modal').classList.add('show')">+ İlan Ekle</button>
</header>

<div class="modal" id="modal">
    <div class="panel">
        <h3>Yeni İlan Oluştur</h3>
        <input type="file" id="imgIn" class="input-field" accept="image/*">
        <input type="text" id="ownerIn" class="input-field" placeholder="Adınız">
        <input type="text" id="carIn" class="input-field" placeholder="Araba Modeli">
        <input type="number" id="priceIn" class="input-field" placeholder="Fiyat (TL)">
        <button class="btn-submit" onclick="addAd()">İLANIMI EKLE</button>
        <button class="btn-submit" style="background:#555" onclick="document.getElementById('modal').classList.remove('show')">KAPAT</button>
    </div>
</div>

<div id="adList"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

    const db = getDatabase(initializeApp({ databaseURL: "https://comborse-76fee-default-rtdb.firebaseio.com/" }));
    const adsRef = ref(db, 'ads');
    let imgData = "";

    // Fotoğrafı yükle
    document.getElementById('imgIn').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => imgData = ev.target.result;
        reader.readAsDataURL(e.target.files[0]);
    };

    // İlan Ekle
    window.addAd = () => {
        if(!imgData || !document.getElementById('carIn').value) return alert("Fotoğraf ve model bilgisi zorunludur!");
        push(adsRef, {
            owner: document.getElementById('ownerIn').value,
            title: document.getElementById('carIn').value,
            price: document.getElementById('priceIn').value,
            img: imgData
        }).then(() => location.reload());
    };

    // İlanları listele
    onValue(adsRef, (snapshot) => {
        const data = snapshot.val();
        const list = document.getElementById('adList');
        list.innerHTML = "";
        if (data) {
            Object.keys(data).forEach(key => {
                const ad = data[key];
                list.innerHTML += `
                    <div class="car-card">
                        <div class="car-image"><img src="${ad.img}"></div>
                        <div class="details">
                            <h3 style="margin:0">${ad.title}</h3>
                            <p style="margin:5px 0">Sahibi: ${ad.owner} - ${ad.price} TL</p>
                            <button class="btn-del" onclick="remove(ref(db, 'ads/${key}')).then(() => location.reload())">Sil</button>
                        </div>
                    </div>`;
            });
        }
    });
</script>
</body>
</html>
